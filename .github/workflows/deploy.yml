name: Deploy

on:
  push:
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda zip
        run: make build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE }}

      - name: Get secrets from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          parse-json-secrets: true
          secret-ids: |
            ,ssl-agents/prod

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_slack_bot_token: ${{ env.SLACK_BOT_TOKEN }}
          TF_VAR_slack_signing_secret: ${{ env.SLACK_SIGNING_SECRET }}
          TF_VAR_coding_routine_trigger_id: ${{ env.CODING_ROUTINE_TRIGGER_ID }}
          TF_VAR_coding_routine_token: ${{ env.CODING_ROUTINE_TOKEN }}
        run: terraform apply -auto-approve
